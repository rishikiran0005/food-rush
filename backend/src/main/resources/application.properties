# ============================================
#  Online Food Ordering System - Config
# ============================================

# Server Port
server.port=8080

# ============================================
# MySQL Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/food_ordering_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=FoodOrderingSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# ============================================
# Logging
# ============================================
logging.level.com.foodorder=DEBUG
logging.level.org.springframework.security=INFO
