# ============================================
#  Online Food Ordering System - Config
# ============================================

# Server Port — Render injects PORT; falls back to 8080 locally
server.port=${PORT:8080}

# ============================================
# MySQL Database Configuration
# ============================================
# Production: set DB_URL, DB_USERNAME, DB_PASSWORD as env vars on Render
# Local defaults kept so you can still run without env vars
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/food_ordering_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================
# JWT Configuration
# ============================================
# Production: set JWT_SECRET as env var on Render (use a long random string)
app.jwt.secret=${JWT_SECRET:FoodOrderingSecretKey2024VeryLongSecretKeyForJWTTokenGeneration}
app.jwt.expiration=86400000

# ============================================
# CORS — Frontend URL (set FRONTEND_URL on Render after Vercel deploy)
# ============================================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ============================================
# Logging
# ============================================
logging.level.com.foodorder=INFO
logging.level.org.springframework.security=WARN
